<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medios Accesible</title>

  <script>
    const isMobile = window.matchMedia("(max-width: 768px)").matches;
    const target = isMobile ? "mobile/" : "desktop/";
    window.location.replace(target);
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #03030a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .loader {
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ff2bff, #00eaff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .bar {
      width: 220px;
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 18px;
    }

    .bar::before {
      content: "";
      display: block;
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, #ff2bff, #00eaff);
      animation: load 1s linear infinite;
    }

    @keyframes load {
      from { transform: translateX(-120%); }
      to { transform: translateX(260%); }
    }
  </style>
</head>

<body>
  <div class="loader">
    <div class="logo">Medios Accesible</div>
    <div class="bar"></div>
  </div>
</body>
</html>
